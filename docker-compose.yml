services:
  agent:
    build: .
    # Mount your target repo into /repo.
    # Set REPO to an absolute path, or run docker compose from inside the target repo (REPO=.).
    # Example: REPO=/path/to/my-app docker compose run --rm agent --yes
    volumes:
      - ${REPO:-.}:/repo
    env_file:
      - path: .env
        required: false
    working_dir: /repo
